<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Morning News">
<meta name="theme-color" content="#faf9f5" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1f1e1c" media="(prefers-color-scheme: dark)">
<meta name="format-detection" content="telephone=no">
<title>Morning News — The Broadsheet</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #faf9f5;
    --surface: #ffffff;
    --text-primary: #141413;
    --text-secondary: #635d4f;
    --text-tertiary: #8e8b86;
    --rule: #e8e6df;
    --rule-strong: #141413;
    --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1f1e1c;
      --surface: #26241f;
      --text-primary: #f5f4ef;
      --text-secondary: #b0aea8;
      --text-tertiary: #7b7972;
      --rule: #2c2a26;
      --rule-strong: #f5f4ef;
    }
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text-primary); font-family: var(--font-serif); -webkit-font-smoothing: antialiased; }
  * { -webkit-tap-highlight-color: transparent; }
  body {
    padding:
      max(20px, env(safe-area-inset-top))
      max(20px, env(safe-area-inset-right))
      max(20px, env(safe-area-inset-bottom))
      max(20px, env(safe-area-inset-left));
    max-width: 640px;
    margin: 0 auto;
    box-sizing: border-box;
  }
  .masthead {
    border-top: 2px solid var(--rule-strong);
    border-bottom: 0.5px solid var(--rule);
    padding: 16px 0 12px;
    margin-bottom: 24px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
  }
  .masthead h1 { font-size: 26px; font-weight: 400; margin: 0; letter-spacing: -0.01em; }
  .masthead .meta { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--font-sans); }
  .intro { font-size: 14px; color: var(--text-secondary); font-style: italic; margin: 0 0 28px; line-height: 1.5; }
  ul.days { list-style: none; padding: 0; margin: 0; border-top: 0.5px solid var(--rule); }
  ul.days li { border-bottom: 0.5px solid var(--rule); }
  ul.days a { display: block; padding: 18px 4px; color: inherit; text-decoration: none; transition: background 0.15s ease; }
  ul.days a:hover, ul.days a:active { background: var(--surface); }
  ul.days .d { display: block; font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-sans); margin-bottom: 6px; }
  ul.days .l { display: block; font-size: 17px; font-weight: 400; line-height: 1.35; color: var(--text-primary); }
  .footer { margin-top: 36px; padding-top: 16px; border-top: 0.5px solid var(--rule); font-size: 11px; color: var(--text-tertiary); font-family: var(--font-sans); letter-spacing: 0.05em; text-align: center; }
  .footer a { color: inherit; }
</style>
</head>
<body>
  <div class="masthead">
    <h1>Morning News</h1>
    <span class="meta">The Broadsheet</span>
  </div>
  <p class="intro">Daily 6:04 AM world brief, lens-scored for a JD/MBA heading into capital markets and entertainment law. Rolling 7-day window — today on top, anything older drops off.</p>
  <ul class="days">
<!--ROWS-->
  </ul>
  <div class="footer">Generated by the morning-news scheduled task. <a href="https://github.com/yellinmatt/morning-news">Source on GitHub</a>.</div>
</body>
</html>
